# Local dev stack: agents + judge + orchestrator + API gateway + Redis + Kafka (DB = Supabase cloud).
# Copy .env.example → .env and fill in SUPABASE_JWT_SECRET + DATABASE_URL before running.

services:
  agents:
    build:
      context: ..
      dockerfile: agents/Dockerfile
    environment:
      AGENTS_PORT: 8090
    ports:
      - "8090:8090"
    restart: unless-stopped

  judge:
    build:
      context: ..
      dockerfile: judge/Dockerfile
    environment:
      JUDGE_PORT: 8091
    ports:
      - "8091:8091"
    restart: unless-stopped

  orchestrator:
    build:
      context: ..
      dockerfile: orchestrator/Dockerfile
    env_file: .env
    depends_on:
      agents:
        condition: service_started
      judge:
        condition: service_started
    environment:
      ORCHESTRATOR_PORT: 50051
      ENVIRONMENT: development
      AGENTS_SERVICE_URL: http://agents:8090
      JUDGE_SERVICE_URL: http://judge:8091
    ports:
      - "50051:50051"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc -w 2 localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  api-gateway:
    build: .
    depends_on:
      orchestrator:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      ORCHESTRATOR_ENABLED: "true"
      ORCHESTRATOR_ADDR: orchestrator:50051
    ports:
      - "8080:8080"
    restart: unless-stopped
