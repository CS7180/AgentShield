name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  api-gateway:
    name: API Gateway Tests + Coverage Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: api-gateway/go.sum

      - name: Unit Tests
        run: go test ./...

      - name: Coverage Gate
        run: make coverage-check COVERAGE_MIN=25

  backend-services:
    name: Orchestrator/Agents/Judge Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [orchestrator, agents, judge]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Unit Tests
        run: go test ./...

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
